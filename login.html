<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management System Login</title>
    <meta name="app-base-url" content="http://rms.test:8080/">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root{--bg:#f6efe2;--surface:#fff8eb;--primary:#3f6a3f;--primary-dark:#2e4f2e;--text:#2f3a2f;--muted:#6c705f;--border:#dccfb8;}
        body{margin:0;background:linear-gradient(rgba(32,39,28,.55), rgba(32,39,28,.55)), url('assets/images/cameroon dishes.jpeg') center/cover fixed no-repeat;font-family:'Segoe UI',Arial,sans-serif;}
        .login-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
        .login-box{width:100%;max-width:420px;background:var(--surface);border-radius:12px;box-shadow:0 12px 30px rgba(69,61,52,.18);padding:2rem;}
        .login-box h1{margin:0 0 .75rem;font-size:1.8rem;color:var(--primary);}
        .login-box .form-group{margin-bottom:1rem;}
        .login-box label{display:block;margin-bottom:.35rem;color:var(--muted);font-weight:600;}
        .login-box input{width:100%;padding:.75rem 10px;border:1px solid var(--border);border-radius:8px;}
        .login-box button{width:100%;padding:.8rem;font-size:1rem;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-weight:700;}
        .login-box button:hover{background:var(--primary-dark);}
        .login-box .link-group{margin-top:.85rem;text-align:center;}
        .login-box a{color:var(--primary);text-decoration:none;font-weight:600;}
        .helper-note{margin:.85rem 0 0;color:var(--muted);font-size:.92rem;line-height:1.5;}
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h1>Login</h1>
            <form id="loginForm" action="login_process.php" method="POST">
                <div class="form-group"><label for="email">Email</label><input type="email" name="email" id="email" placeholder="you@example.com" required></div>
                <div class="form-group"><label for="password">Password</label><input type="password" name="password" id="password" placeholder="******" required></div>
                <button type="submit" name="submit_login">Sign In</button>
            </form>
            <p class="helper-note" id="helperNote" hidden>Opening the full PHP login page on the application host for a same-origin sign-in flow.</p>
            <div class="link-group"><a href="register.html">Create customer account</a></div>
            <div class="link-group"><a href="index.html">Back to Home</a></div>
        </div>
    </div>
    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const configuredBaseUrl = document.querySelector('meta[name="app-base-url"]')?.content?.trim();
            const helperNote = document.getElementById('helperNote');

            if (!form || !configuredBaseUrl) {
                return;
            }

            if (window.location.port === '5500' || window.location.protocol === 'file:') {
                const normalizedBaseUrl = configuredBaseUrl.endsWith('/')
                    ? configuredBaseUrl
                    : `${configuredBaseUrl}/`;
                if (helperNote) {
                    helperNote.hidden = false;
                }
                window.location.replace(new URL('login.php', normalizedBaseUrl).toString());
            }
        })();
    </script>
</body>
</html>

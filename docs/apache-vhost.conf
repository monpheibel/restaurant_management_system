<VirtualHost *:8080>
    ServerName rms.test
    DocumentRoot "/opt/lampp/htdocs/restaurant_management_system"

    <Directory "/opt/lampp/htdocs/restaurant_management_system">
        AllowOverride All
        Require all granted
        Options FollowSymLinks Indexes
        DirectoryIndex index.php index.html
    </Directory>

    ErrorLog "logs/rms.test-error_log"
    CustomLog "logs/rms.test-access_log" combined
</VirtualHost>
